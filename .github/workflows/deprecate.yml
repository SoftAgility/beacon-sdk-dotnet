name: Deprecate old NuGet versions

# One-shot, manually-triggered job to UNLIST superseded versions on NuGet.org.
# NuGet does not allow hard-delete or deprecation-with-message via the CLI; `dotnet
# nuget delete` performs an unlist (hides the version from search and from default
# restore — the exact version stays resolvable if pinned). For a rich "use 3.0.0"
# deprecation message + alternate-package pointer, use the NuGet.org web UI once.
on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'Space-separated versions to unlist'
        required: true
        default: '1.0.0 1.1.0 2.0.0'

permissions:
  contents: read

jobs:
  unlist:
    name: Unlist superseded SoftAgility.Beacon versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Unlist versions
        run: |
          for v in ${{ inputs.versions }}; do
            echo "::group::Unlisting SoftAgility.Beacon $v"
            dotnet nuget delete SoftAgility.Beacon "$v" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --non-interactive
            echo "::endgroup::"
          done
