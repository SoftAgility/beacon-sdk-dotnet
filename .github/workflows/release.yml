name: Release to NuGet

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 3.2.0). If empty, uses tag name.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  publish:
    name: Pack + push SoftAgility.Beacon
    # Windows is required: the SDK multi-targets net48 and net8.0-windows, which
    # only build (and net48 only tests) on Windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # SourceLink embeds correct git commit info — needs full history
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      # Build gate — all five TFMs must compile before we run tests / publish.
      - name: Build library (all 5 TFMs)
        run: dotnet build SoftAgility.Beacon.csproj -c Release

      # Release quality gate: full suite on each runnable TFM.
      - name: Test (net8.0)
        run: dotnet test tests/SoftAgility.Beacon.Tests.csproj -c Release -f net8.0 --logger "console;verbosity=normal"

      - name: Test (net6.0 — rolls forward to net8 runtime)
        run: dotnet test tests/SoftAgility.Beacon.Tests.csproj -c Release -f net6.0 --logger "console;verbosity=normal"

      - name: Test (net48 — .NET Framework testhost, AppDomain disabled for native SQLite)
        run: dotnet test tests/SoftAgility.Beacon.Tests.csproj -c Release -f net48 --settings tests/net48.runsettings --logger "console;verbosity=normal"

      # Pack with a fresh versioned build so the package version is authoritative
      # regardless of intermediate test builds.
      - name: Pack
        run: dotnet pack SoftAgility.Beacon.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts

      - name: Inspect package contents
        shell: pwsh
        run: |
          Get-ChildItem ./artifacts
          $nupkg = "./artifacts/SoftAgility.Beacon.${{ steps.version.outputs.VERSION }}.nupkg"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          Write-Host "--- lib/ assets in package ---"
          [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $nupkg)).Entries.FullName |
            Where-Object { $_ -like 'lib/*' } | Sort-Object

      - name: Push to NuGet
        # dotnet nuget push auto-pushes the matching .snupkg in the same directory
        run: dotnet nuget push artifacts/SoftAgility.Beacon.${{ steps.version.outputs.VERSION }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          DOTNET_NOLOGO: 'true'
