name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Test on both Linux (the publish runner) and Windows (since the SDK has a
        # net8.0-windows target and a WinForms example in the consumer ecosystem).
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --logger "console;verbosity=normal"

      - name: Pack (verify packaging works without actually publishing)
        run: dotnet pack SoftAgility.Beacon.csproj -c Release --no-build -o ./artifacts

      - name: Upload package artifact (Linux only — same on both platforms)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.*nupkg
          retention-days: 7
